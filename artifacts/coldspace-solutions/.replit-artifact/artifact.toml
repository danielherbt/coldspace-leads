kind = "web"
previewPath = "/"
title = "ColdSpace Solutions"
version = "1.0.0"
id = "artifacts/coldspace-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20466
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/coldspace-solutions run dev"

[services.env]
PORT = "20466"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/coldspace-solutions", "run", "build"]
publicDir = "artifacts/coldspace-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
